<div class="shell">
  <ng-template #primaryLinks let-linkClass="linkClass">
    <ng-container *ngIf="user$ | async as user">
      <a
        [class]="linkClass"
        routerLink="/app/dashboard"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        *ngIf="
          !user.isSystemAdmin &&
          (user.permissions.includes('ADMIN.DASHBOARD.VIEW') ||
            user.permissions.includes('ADMIN.DASHBOARD.MANAGE'))
        "
      >
        {{ 'NAV.DASHBOARD' | translate }}
      </a>
      <ng-container *ngIf="!user.isSystemAdmin">
        <a
          [class]="linkClass"
          routerLink="/app/matcher"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
          *appHasPermission="'ADMIN.RECONCILIATION.VIEW'"
        >
          {{ 'NAV.MATCHER' | translate }}
        </a>
      </ng-container>
    </ng-container>
    <a
      [class]="linkClass"
      routerLink="/app/transactions"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
      *ngIf="!(user$ | async)?.isSystemAdmin && hasAnyPermission(user$ | async, transactionEntryPermissions)"
    >
      Transactions
    </a>
    <a
      [class]="linkClass"
      routerLink="/app/imports"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      *ngIf="!(user$ | async)?.isSystemAdmin && hasAnyPermission(user$ | async, importEntryPermissions)"
    >
      Imports
    </a>
    <a
      [class]="linkClass"
      [routerLink]="getAdminRoot(user$ | async)"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: false }"
      *ngIf="hasAnyPermission(user$ | async, adminEntryPermissions)"
    >
      {{ 'NAV.ADMIN' | translate }}
    </a>
    <a
      [class]="linkClass"
      routerLink="/app/profile"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      {{ 'NAV.PROFILE' | translate }}
    </a>
  </ng-template>

  <aside class="shell__sidebar">
    <div class="shell__brand-panel fr-glass-panel">
      <div class="shell__brand-mark">FR</div>
      <div>
        <div class="shell__brand">{{ 'NAV.LOGO' | translate }}</div>
      </div>
    </div>

    <nav class="shell__sidebar-nav" aria-label="Primary">
      <ng-container
        [ngTemplateOutlet]="primaryLinks"
        [ngTemplateOutletContext]="{ linkClass: 'shell__nav-link' }"
      ></ng-container>
    </nav>
  </aside>

  <div class="shell__workspace">
    <header class="shell__topbar">
      <div class="shell__topbar-row">
        <div class="shell__mobile-brand">
          <div class="shell__brand">{{ 'NAV.LOGO' | translate }}</div>
        </div>

        <div class="shell__topbar-actions">
          <div class="shell__language-shell fr-glass-panel">
            <app-language-switcher></app-language-switcher>
          </div>

          <ng-container *ngIf="user$ | async as user">
            <button mat-icon-button [matMenuTriggerFor]="userMenu" class="shell__avatar-btn">
              <ng-container *ngIf="profileImageUrl; else initials">
                <img [src]="profileImageUrl" alt="Profile" class="shell__avatar-img" />
              </ng-container>
              <ng-template #initials>
                <span class="shell__avatar-fallback">{{ getInitials(user.displayName) }}</span>
              </ng-template>
            </button>
            <mat-menu #userMenu="matMenu" xPosition="before">
              <div class="shell__menu-header">
                <div class="shell__menu-name">{{ user.displayName }}</div>
                <div class="shell__menu-email">{{ user.email }}</div>
              </div>
              <button mat-menu-item (click)="logout()">
                <mat-icon>logout</mat-icon>
                <span>{{ 'NAV.SIGN_OUT' | translate }}</span>
              </button>
            </mat-menu>
          </ng-container>
        </div>
      </div>

      <nav class="shell__mobile-nav" aria-label="Primary">
        <ng-container
          [ngTemplateOutlet]="primaryLinks"
          [ngTemplateOutletContext]="{ linkClass: 'shell__mobile-link' }"
        ></ng-container>
      </nav>
    </header>

    <main class="shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
