<section class="imports-shell">
  <div class="imports-shell__nav-shell fr-glass-panel">
    <nav
      mat-tab-nav-bar
      backgroundColor="primary"
      color="primary"
      [tabPanel]="tabPanel"
      class="imports-shell__nav"
    >
      <a
        mat-tab-link
        class="imports-shell__link"
        *ngFor="let link of visibleLinks$ | async"
        [routerLink]="link.path"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        #rla="routerLinkActive"
        [active]="rla.isActive"
        [class.active-link]="rla.isActive"
      >
        <ng-container *ngIf="link.label.startsWith('ADMIN.'); else staticLabel">
          {{ link.label | translate }}
        </ng-container>
        <ng-template #staticLabel>{{ link.label }}</ng-template>
      </a>
    </nav>
  </div>

  <mat-tab-nav-panel #tabPanel>
    <div class="imports-shell__content">
      <router-outlet></router-outlet>
    </div>
  </mat-tab-nav-panel>
</section>
