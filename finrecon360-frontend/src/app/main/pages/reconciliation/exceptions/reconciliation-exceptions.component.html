<div class="recon-exceptions">
  <header>
    <h2>Reconciliation Exceptions</h2>
    <p>Bank statement lines that remain unreconciled.</p>
  </header>

  <mat-card>
  <table mat-table [dataSource]="(lines$ | async) || []" class="mat-elevation-z1">
      <ng-container matColumnDef="transactionDate">
        <th mat-header-cell *matHeaderCellDef>Transaction Date</th>
        <td mat-cell *matCellDef="let row">{{ row.transactionDate | date:'shortDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let row">{{ row.description }}</td>
      </ng-container>

      <ng-container matColumnDef="amount">
        <th mat-header-cell *matHeaderCellDef>Amount</th>
        <td mat-cell *matCellDef="let row">{{ row.amount | currency }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card>
</div>
